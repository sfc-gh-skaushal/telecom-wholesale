version: 2

sources:
  - name: raw_whl
    database: telco_demo
    schema: raw_whl
    tables:
      - name: raw_partners
        description: Raw partner/customer data with credit profiles
      - name: raw_cdr_aggregates
        description: Aggregated CDR data with reconciliation status
